name: Publish betterzeriya container

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, for example 0.1.0'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  VERSION: ${{ inputs.version }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate version
        run: |
          if ! node -e "process.exit(/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(process.env.VERSION) ? 0 : 1)"; then
            echo "Invalid version: ${VERSION}. Use x.x.x, for example 0.1.0." >&2
            exit 1
          fi

      - name: Prepare image metadata
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/betterzeriya" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/betterzeriya/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ env.VERSION }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ env.VERSION }}
