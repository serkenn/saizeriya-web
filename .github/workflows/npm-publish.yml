name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, for example 0.1.0'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: saizeriya.js
      VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate version
        run: |
          if ! node -e "process.exit(/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(process.env.VERSION) ? 0 : 1)"; then
            echo "Invalid version: ${VERSION}. Use x.x.x, for example 0.1.0." >&2
            exit 1
          fi

      - name: Set package version
        working-directory: packages/client
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Pack client
        run: bun --cwd packages/client pack

      - name: Check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Publish client
        working-directory: packages/client
        run: npm publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ env.PACKAGE_NAME }}@${{ env.VERSION }}
        run: |
          gh release create "$TAG_NAME" \
            --target "$GITHUB_SHA" \
            --title "$TAG_NAME" \
            --notes "Published ${PACKAGE_NAME}@${VERSION} to npm."
